<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="icon-192.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Planner" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Zusammenkunfts-Planer für eine Versammlung — Wochenprogramme, Aufgaben zuteilen, Personenverwaltung." />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#191a17" media="(prefers-color-scheme: dark)" />

    <!-- Farbschema vor dem ersten Paint setzen (kein Flackern). Schemata wie
         THEME_LIST in src/data/constants.ts; alte Werte light/dark gemappt. -->
    <script>
      (function () {
        try {
          var THEMES = {
            weiss: 0, indigo: 0, blatt: 0, papaya: 0,
            graphit: 1, bernstein: 1, aubergine: 1, koralle: 1,
          }
          var stored = localStorage.getItem('theme')
          if (stored === 'light') stored = 'weiss'
          if (stored === 'dark') stored = 'graphit'
          if (!(stored in THEMES)) {
            stored = window.matchMedia('(prefers-color-scheme: dark)').matches
              ? 'graphit'
              : 'weiss'
          }
          document.documentElement.dataset.theme = stored
          if (THEMES[stored]) document.documentElement.dataset.dark = '1'
        } catch (e) {
          /* localStorage nicht verfügbar — Standard bleibt Reinweiß */
        }
      })()
    </script>

    <!-- Schriften: Newsreader (Serif) + IBM Plex Sans (UI), Lizenz OFL -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap"
      rel="stylesheet"
    />

    <title>JW Congregation Planner</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
